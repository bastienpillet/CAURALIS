<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Application AppSheet</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Centre le contenu ou ajoute une couleur de fond si besoin */
            background-color: #f4f4f9; 
        }
        .app-container {
            width: 100%;
            height: 100vh; /* Prend toute la hauteur de l'écran */
            display: flex;
            justify-content: center;
        }
        iframe {
            width: 100%;
            max-width: 1200px; /* Largeur maximale pour les grands écrans */
            height: 100%;
            border: none; /* Enlève la bordure disgracieuse */
        }
    </style>
</head>
<body>

    <div class="app-container">
        <iframe src="https://eu.appsheet.com/start/6fdb71cb-b7e9-4b2f-853e-9781df966847" allow="camera; microphone; geolocation"></iframe>
    </div>

</body>
</html>
